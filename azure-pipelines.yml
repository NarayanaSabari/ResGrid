trigger:
  branches:
    include:
      - main
pr:
  branches:
    include:
      - '*'

variables:
  containerRegistry: 'drcscr.azurecr.io'  # ACR URL
  k8sServiceConnection: 'DRCSCluster'  # Service connection for AKS
  azureRMServiceConnection: 'azureRMService'  # Service connection for Azure
  aksCluster: 'drcsCluster'                  # AKS cluster name
  resourceGroup: 'DRCS'            # Resource group for AKS
  namespace: 'default'                              # Kubernetes namespace to deploy to

pool:
  name: Default
  clean: all

stages:
- stage: DeployToAKS
  displayName: 'Deploy to AKS'
  jobs:
  - deployment: DeployToAKS
    displayName: 'Deploy to AKS'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            persistCredentials: true
            
          - task: Bash@3
            displayName: 'Combine deployment and service YAML files'
            inputs:
              targetType: 'inline'
              script: |
                set -e  # Exit immediately if a command exits with a non-zero status

                # Ensure the directory exists
                mkdir -p $(Build.ArtifactStagingDirectory)

                # Combine the files
                cat $(Build.SourcesDirectory)/k8s/communication/deployment.yml >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                echo -e "\n" >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                cat $(Build.SourcesDirectory)/k8s/incident_reporting/deployment.yml >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                echo -e "\n" >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                cat $(Build.SourcesDirectory)/k8s/resource_allocation/deployment.yml >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                echo -e "\n" >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                cat $(Build.SourcesDirectory)/k8s/severity_assessment/deployment.yml >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                echo -e "\n" >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                cat $(Build.SourcesDirectory)/k8s/situation_monitoring/deployment.yml >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                echo -e "\n" >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                cat $(Build.SourcesDirectory)/k8s/communication/service.yml >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                echo -e "\n" >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                cat $(Build.SourcesDirectory)/k8s/incident_reporting/service.yml >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                echo -e "\n" >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                cat $(Build.SourcesDirectory)/k8s/resource_allocation/service.yml >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                echo -e "\n" >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                cat $(Build.SourcesDirectory)/k8s/severity_assessment/service.yml >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                echo -e "\n" >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                cat $(Build.SourcesDirectory)/k8s/situation_monitoring/service.yml >> $(Build.ArtifactStagingDirectory)/combined-manifest.yml
                
                sed -i 's|image: .*|image: $(containerRegistry)/$(imageRepository):$(tag)|g' $(Build.ArtifactStagingDirectory)/combined-manifest.yaml
                
                # Display the contents of the combined file (for debugging)
                cat $(Build.ArtifactStagingDirectory)/combined-manifest.yml

          - task: Kubernetes@1
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: '$(k8sServiceConnection)'
              namespace: '$(namespace)'
              command: 'apply'
              useConfigurationFile: true
              configuration: '$(Build.ArtifactStagingDirectory)/combined-manifest.yml'
              secretType: 'dockerRegistry'
              containerRegistryType: 'Azure Container Registry'
              azureSubscriptionEndpointForSecrets: '$(azureRMServiceConnection)'
              azureContainerRegistry: '$(containerRegistry)'

          - task: Kubernetes@1
            displayName: 'Verify Deployment'
            inputs:
              connectionType: 'Azure Resource Manager'
              azureSubscriptionEndpoint: '$(azureRMServiceConnection)'
              azureResourceGroup: '$(resourceGroup)'
              kubernetesCluster: '$(aksCluster)'
              namespace: '$(namespace)'
              command: 'get'
              arguments: 'pods'

          - script: |
              echo "Application deployed to AKS cluster $(aksCluster)"
              kubectl get svc -n $(namespace); echo "Check your public IP above."
            displayName: 'Print Deployment Info'