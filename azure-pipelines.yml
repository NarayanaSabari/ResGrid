trigger:
  branches:
    include:
      - main
pr:
  branches:
    include:
      - '*'
variables:
  dockerHubUsername: 'sabarinarayana'  # Replace with your Docker Hub username
  dockerRegistry: 'DockerHubDRCS'
  k8sServiceConnection: 'DRCSCluster'  # Service connection for AKS
  azureRMServiceConnection: 'azureRMService'  # Service connection for Azure
  aksCluster: 'drcsCluster'  # AKS cluster name
  resourceGroup: 'DRCS'  # Resource group for AKS
  namespace: 'default'  # Kubernetes namespace to deploy to
  firebaseServiceAccountKey: '$(FIREBASE_SERVICE_ACCOUNT_KEY)'  # Assume this variable is set in Azure DevOps

pool:
  name: Default
  clean: all

stages:
- stage: BuildDockerImages
  displayName: 'Build Docker Images'
  jobs:
  - job: BuildAndPushImages
    displayName: 'Build and Push Docker Images'
    steps:
    - task: Bash@3
      inputs:
        targetType: 'inline'
        script: |
          echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > serviceAccountKey.json
      displayName: 'Create Firebase Service Account Key'
      env:
        FIREBASE_SERVICE_ACCOUNT_KEY: $(firebaseServiceAccountKey)

    # Communication Service
    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRegistry)'
        command: 'build'
        repository: '$(dockerHubUsername)/communication'
        dockerfile: '$(Build.SourcesDirectory)/services/communication/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest
        buildContext: '$(Build.SourcesDirectory)/services/communication'
        arguments: '--build-arg FIREBASE_SERVICE_ACCOUNT_KEY=$(firebaseServiceAccountKey)'
      displayName: 'Build Communication Image'

    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRegistry)'
        command: 'push'
        repository: '$(dockerHubUsername)/communication'
        tags: |
          $(Build.BuildId)
          latest
      displayName: 'Push Communication Image'

    # Incident Reporting Service
    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRegistry)'
        command: 'build'
        repository: '$(dockerHubUsername)/incident_reporting'
        dockerfile: '$(Build.SourcesDirectory)/services/incident_reporting/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest
        buildContext: '$(Build.SourcesDirectory)/services/incident_reporting'
        arguments: '--build-arg FIREBASE_SERVICE_ACCOUNT_KEY=$(firebaseServiceAccountKey)'
      displayName: 'Build Incident Reporting Image'

    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRegistry)'
        command: 'push'
        repository: '$(dockerHubUsername)/incident_reporting'
        tags: |
          $(Build.BuildId)
          latest
      displayName: 'Push Incident Reporting Image'

    # Resource Allocation Service
    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRegistry)'
        command: 'build'
        repository: '$(dockerHubUsername)/resource_allocation'
        dockerfile: '$(Build.SourcesDirectory)/services/resource_allocation/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest
        buildContext: '$(Build.SourcesDirectory)/services/resource_allocation'
        arguments: '--build-arg FIREBASE_SERVICE_ACCOUNT_KEY=$(firebaseServiceAccountKey)'
      displayName: 'Build Resource Allocation Image'

    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRegistry)'
        command: 'push'
        repository: '$(dockerHubUsername)/resource_allocation'
        tags: |
          $(Build.BuildId)
          latest
      displayName: 'Push Resource Allocation Image'

    # Severity Assessment Service
    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRegistry)'
        command: 'build'
        repository: '$(dockerHubUsername)/severity_assessment'
        dockerfile: '$(Build.SourcesDirectory)/services/severity_assessment/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest
        buildContext: '$(Build.SourcesDirectory)/services/severity_assessment'
        arguments: '--build-arg FIREBASE_SERVICE_ACCOUNT_KEY=$(firebaseServiceAccountKey)'
      displayName: 'Build Severity Assessment Image'

    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRegistry)'
        command: 'push'
        repository: '$(dockerHubUsername)/severity_assessment'
        tags: |
          $(Build.BuildId)
          latest
      displayName: 'Push Severity Assessment Image'

    # Situation Monitoring Service
    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRegistry)'
        command: 'build'
        repository: '$(dockerHubUsername)/situation_monitoring'
        dockerfile: '$(Build.SourcesDirectory)/services/situation_monitoring/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest
        buildContext: '$(Build.SourcesDirectory)/services/situation_monitoring'
        arguments: '--build-arg FIREBASE_SERVICE_ACCOUNT_KEY=$(firebaseServiceAccountKey)'
      displayName: 'Build Situation Monitoring Image'

    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRegistry)'
        command: 'push'
        repository: '$(dockerHubUsername)/situation_monitoring'
        tags: |
          $(Build.BuildId)
          latest
      displayName: 'Push Situation Monitoring Image'