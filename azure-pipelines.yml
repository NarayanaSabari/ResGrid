trigger:
  branches:
    include:
      - main
pr:
  branches:
    include:
      - '*'

variables:
  dockerHubUsername: 'sabarinarayana'  # Replace with your Docker Hub username
  dockerRpo: 'DockerHubDRCS'
  k8sServiceConnection: 'DRCSCluster'  # Service connection for AKS
  azureRMServiceConnection: 'azureRMService'  # Service connection for Azure
  aksCluster: 'drcsCluster'  # AKS cluster name
  resourceGroup: 'DRCS'  # Resource group for AKS
  namespace: 'default'  # Kubernetes namespace to deploy to

pool:
  name: Default
  clean: all

stages:
- stage: BuildDockerImages
  displayName: 'Build Docker Images'
  jobs:
  - job: BuildAndPushImages
    displayName: 'Build and Push Docker Images'
    steps:
    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRpo)'  # Create a service connection to Docker Hub in your Azure DevOps project
        command: 'buildAndPush'
        repository: '$(dockerHubUsername)/communication'
        dockerfile: '$(Build.SourcesDirectory)/services/communication/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest
    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRpo)'
        command: 'buildAndPush'
        repository: '$(dockerHubUsername)/incident_reporting'
        dockerfile: '$(Build.SourcesDirectory)/services/incident_reporting/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest
    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRpo)'
        command: 'buildAndPush'
        repository: '$(dockerHubUsername)/resource_allocation'
        dockerfile: '$(Build.SourcesDirectory)/services/resource_allocation/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest
    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRpo)'
        command: 'buildAndPush'
        repository: '$(dockerHubUsername)/severity_assessment'
        dockerfile: '$(Build.SourcesDirectory)/services/severity_assessment/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest
    - task: Docker@2
      inputs:
        containerRegistry: '$(dockerRpo)'
        command: 'buildAndPush'
        repository: '$(dockerHubUsername)/situation_monitoring'
        dockerfile: '$(Build.SourcesDirectory)/services/situation_monitoring/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest