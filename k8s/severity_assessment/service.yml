apiVersion: v1
kind: Service
metadata:
  name: severity-assessment-service-service # Change to your microservice name
spec:
  selector:
    app: severity-assessment-service  # This must match the app label in the Deployment
  ports:
    - protocol: TCP
      port: 5004  # Port for external access
      targetPort: 5000  # Port where the app is running in the container
  type: LoadBalancer  # Use LoadBalancer if you want to expose it externally
---